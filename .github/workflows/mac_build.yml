name: Build MacOS App
on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装打包依赖
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller pandas openpyxl

      - name: 打包为独立可执行文件
        run: pyinstaller -F cycle_analysis.py

      - name: 压缩成品程序
        run: zip -r Mac工具.zip dist/cycle_analysis

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: Mac工具压缩包
          path: Mac工具.zip
